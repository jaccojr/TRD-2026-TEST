name: Fetch weather

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: python shift_dates.py
      - run: python fetch_weather.py
      - run: |
          git config user.name "weather-bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add weather.json data.js _points_data.json
          git commit -m "daily date shift + weather update" || echo "no changes"
          git pull --rebase --autostash origin main || true
          git push
